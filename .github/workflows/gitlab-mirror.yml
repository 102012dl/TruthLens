name: Mirror to GitLab

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key for GitLab mirror
        env:
          GITLAB_SSH_KEY: ${{ secrets.GITLAB_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${GITLAB_SSH_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

      - name: Test SSH connectivity to GitLab (non-fatal)
        continue-on-error: true
        run: |
          ssh -o StrictHostKeyChecking=yes -i ~/.ssh/id_ed25519 git@gitlab.com -T || echo "SSH test failed (check deploy key and host key)."

      - name: Push to GitLab mirror
        env:
          GITLAB_SSH_KEY: ${{ secrets.GITLAB_SSH_KEY }}
        run: |
          git remote add gitlab git@gitlab.com:102012dl/TruthLens.git || true
          git push gitlab main || {
            echo "::warning::GitLab mirror push failed."
            echo "Hint: Ensure the Deploy Key on the GitLab repo matches the public key and has Write access enabled."
          }

