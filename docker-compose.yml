# TruthLens — docker-compose skeleton
# Run: docker-compose up -d
# Services: api (FastAPI), bot (Telegram), dashboard (Streamlit), mlflow-ui (optional)

services:
  api:
    build: .
    image: truthlens-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - ENV=production
    # volumes:  # mount mlruns for MLflow if needed
    #   - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Uncomment when bot is implemented and .env has TELEGRAM_BOT_TOKEN
