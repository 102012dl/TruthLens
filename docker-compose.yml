  #   image: truthlens-backend
  #   command: ["python", "-m", "bot.telegram_bot"]
  #   env_file: .env
  #   environment:
  #     - BACKEND_URL=http://api:8000
  #   depends_on:
  #     api:
  #       condition: service_healthy

  # Uncomment for Streamlit dashboard
  # dashboard:
